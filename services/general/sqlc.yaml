version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/adapters/repo/database/query/"
    schema: "migration/"
    gen:
      go:
        package: "database"
        out: "internal/adapters/repo/database"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            nullable: false
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "timestamptz"
            nullable: false
            go_type:
              import: "time"
              type: "Time"
